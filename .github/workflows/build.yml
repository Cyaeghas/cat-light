name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            build_dir: msvc-release
            artifact: cat-light-windows-msvc
          - os: ubuntu-latest
            build_dir: linux-release
            artifact: cat-light-linux-x64
            binary: build/linux-release/cat-light
          - os: macos-14
            build_dir: macos-release
            artifact: cat-light-macos-arm64
            binary: build/macos-release/cat-light
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Configure Windows
        if: runner.os == 'Windows'
        run: cmake -S . -B build/msvc-release -G "Visual Studio 17 2022" -A x64 -DCAT_LIGHT_ENABLE_SQLITE=ON
      - name: Build Windows
        if: runner.os == 'Windows'
        run: cmake --build build/msvc-release --config Release
      - name: Configure Unix
        if: runner.os != 'Windows'
        run: cmake -S . -B build/${{ matrix.build_dir }} -DCMAKE_BUILD_TYPE=Release -DCAT_LIGHT_ENABLE_SQLITE=ON
      - name: Build Unix
        if: runner.os != 'Windows'
        run: cmake --build build/${{ matrix.build_dir }}
      - name: Test Windows fixtures
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\scripts\test-fixtures.ps1 -Exe build\msvc-release\Release\cat-light.exe -Storage jsonl
          .\scripts\test-fixtures.ps1 -Exe build\msvc-release\Release\cat-light.exe -Storage sqlite
      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            build/msvc-release/Release/cat-light.exe
            build/msvc-release/Release/cat-light-tray.exe
      - name: Upload Unix artifact
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
      - name: Package artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          for dir in dist/*; do
            name="$(basename "$dir")"
            if [[ "$name" == *windows* ]]; then
              (cd "$dir" && zip -r "../../release/${name}.zip" .)
            else
              tar -C "$dir" -czf "release/${name}.tar.gz" .
            fi
          done
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release create "${GITHUB_REF_NAME}" release/* --title "${GITHUB_REF_NAME}" --notes "cat-light ${GITHUB_REF_NAME}"
